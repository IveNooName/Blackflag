<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Blackflag</title>

    <link rel="icon" href="/logo-light.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" href="/logo-dark.svg" media="(prefers-color-scheme: dark)">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!--    <link rel="stylesheet" href="bootstrap-breakpoint.css">-->
  <script type="module" crossorigin src="/assets/index-Cld25Q7t.js"></script>
</head>
<header>
    <div class="bs-component">
        <div class="navbar-dark bg-primary py-2">
            <div class="h1 text-white text-center">Blackflag</div>
        </div>
    </div>
    <br>
</header>


<body class="container">

<div class="alert alert-danger alert-dismissible fade show" role="alert" style="display: none;" id="error-alert">
    <span id="error-message">An Error occurred while downloading the music!</span>
    <button type="button" class="btn-close" aria-label="Close" onclick="closeErrorAlert()"></button>
</div>

<div class="input-group input-group-lg py-4 has-validation">
    <div class="form-floating">
        <input class="form-control" type="url" id="deezer-album-url-input" placeholder="Enter Deezer album link"
               onclick="hideInvalidLinkField()">
        <label for="deezer-album-url-input">Deezer Album Link</label>
    </div>
    <button class="btn btn-primary" id="deezer-album-url-button" onclick="main()">
        <span class="spinner-border spinner-border-sm" id="deezer-album-url-button-spinner" aria-hidden="true"
              hidden></span>
        <span role="status" id="deezer-album-url-button-text">Submit</span>
    </button>

    <div class="invalid-feedback" id="deezer-album-url-feedback">Invalid Link</div>
</div>

</body>
</html>
